name: Publish Python Package

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (build only, skip publish)'
        required: false
        default: false
        type: boolean
  release:
    types: [published]

permissions:
  contents: read

jobs:
  test:
    uses: ./.github/workflows/tests.yml  # ← reużywa istniejącego workflow

  release-build:
    runs-on: ubuntu-latest
    needs:
      - test  # ← build tylko jeśli testy przeszły

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: false
          installer-parallel: true

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pypoetry
            ~/.cache/pip
          key: ${{ runner.os }}-poetry-3.12-${{ hashFiles('poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-poetry-3.12-

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Build distributions
        run: poetry build

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: release-dists
          path: dist/

  pypi-publish:
    runs-on: ubuntu-latest
    needs:
      - release-build
    if: ${{ github.event_name == 'release' || github.event.inputs.dry_run != 'true' }}

    permissions:
      id-token: write

    environment:
      name: pypi
      # url: https://pypi.org/p/YOURPROJECT

    steps:
      - name: Retrieve release distributions
        uses: actions/download-artifact@v4
        with:
          name: release-dists
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

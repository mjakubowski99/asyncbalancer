name: Python CI (Poetry + Redis)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    services:
      redis:
        image: redis:8.6          # ← najnowsza stabilna wersja
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        uses: snok/install-poetry@v1      # ← dedykowana akcja zamiast pip install
        with:
          virtualenvs-create: false
          installer-parallel: true

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pypoetry
            ~/.cache/pip
          key: ${{ runner.os }}-poetry-${{ matrix.python-version }}-${{ hashFiles('poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-poetry-${{ matrix.python-version }}-

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Run tests
        env:
          ASYNCBALANCER_DRIVERS_REDIS_HOST: localhost
          ASYNCBALANCER_DRIVERS_REDIS_PORT: 6379
          ASYNCBALANCER_DRIVERS_REDIS_DB: 0
        run: poetry run pytest tests/ --asyncio-mode=auto
